name: Continuous Integration

on:
  push: 
    tags:
      - 'v*.*.*'
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build-push:
    needs: test
    uses: ./.github/workflows/build_push.yml
    secrets: inherit

  cleanup:
    needs: build-push
    uses: ./.github/workflows/cleanup.yml
    secrets: inherit